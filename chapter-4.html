<html lang="en">
<head>

  <title>Redirecting to the main page</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="canonical" href="index.html" />
  <script>
    // Preserve section anchor if present; otherwise go to the main page root.
    (function () {
      var hash = window.location.hash || "";
      var map = {
        "#sec-4-1": "#left-right",
        "#sec-4-2": "#extremes",
        "#sec-4-3": "#regimes",
        "#sec-4-4": "#predictors"
      };
      var target = map[hash] || hash || "";
      window.location.replace("index.html" + target);
    })();
  </script>
</head>
<body>
  <p>This page has moved. Redirecting to <a href="index.html">the main page</a>&hellip;</p>
</body>
